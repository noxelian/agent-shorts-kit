name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q shorts.py pipeline tests

  remotion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/remotion/package-lock.json
      - run: npm --prefix pipeline/remotion ci
      - run: npm --prefix pipeline/remotion run typecheck
